name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # ── Go Analyzer ──────────────────────────────────────────────────────────────
  analyzer-lint:
    name: Analyzer — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: analyzer/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: analyzer

  analyzer-test:
    name: Analyzer — Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: analyzer/go.sum

      - name: Install Tree-sitter grammars
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential

      - name: Run tests
        working-directory: analyzer
        run: go test ./... -v -race -count=1 -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: analyzer/coverage.out
          flags: analyzer

  # ── Python Control Plane ─────────────────────────────────────────────────────
  api-lint:
    name: Control Plane — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: control-plane/requirements.txt

      - name: Install deps
        working-directory: control-plane
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        working-directory: control-plane
        run: ruff check .

      - name: Mypy type check
        working-directory: control-plane
        run: mypy app/

  api-test:
    name: Control Plane — Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: flakeshield_test
          POSTGRES_USER: flakeshield
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: control-plane/requirements.txt

      - name: Install deps
        working-directory: control-plane
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations
        working-directory: control-plane
        env:
          DATABASE_URL: postgresql+asyncpg://flakeshield:testpassword@localhost:5432/flakeshield_test
        run: alembic upgrade head

      - name: Run tests
        working-directory: control-plane
        env:
          DATABASE_URL: postgresql+asyncpg://flakeshield:testpassword@localhost:5432/flakeshield_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          AI_PATCH_MOCK: "true"
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: control-plane/coverage.xml
          flags: control-plane

  # ── Next.js Dashboard ────────────────────────────────────────────────────────
  dashboard-lint:
    name: Dashboard — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install deps
        working-directory: dashboard
        run: npm ci

      - name: Lint
        working-directory: dashboard
        run: npm run lint

      - name: Type check
        working-directory: dashboard
        run: npm run type-check

      - name: Build
        working-directory: dashboard
        run: npm run build
