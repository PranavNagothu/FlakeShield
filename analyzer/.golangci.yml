version: "2"

run:
  timeout: 5m
  go: "1.22"

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/PranavNagothu/FlakeShield

issues:
  exclude-rules:
    # Ignore shadowing in test files
    - path: _test\.go
      linters:
        - govet
    # Allow unused parameters in interface implementations
    - linters:
        - unused
      text: "is unused"
