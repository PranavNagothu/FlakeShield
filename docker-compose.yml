version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: flakeshield-postgres
    environment:
      POSTGRES_DB: flakeshield
      POSTGRES_USER: flakeshield
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flakeshield"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flakeshield-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Go Static Analysis Engine ──────────────────────────────────────────────
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    container_name: flakeshield-analyzer
    environment:
      REDIS_URL: redis://redis:6379/0
      GRPC_PORT: "50051"
      HTTP_PORT: "8001"
      LOG_LEVEL: info
    ports:
      - "50051:50051"   # gRPC
      - "8001:8001"     # HTTP REST (for CLI)
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python FastAPI Control Plane ───────────────────────────────────────────
  control-plane:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    container_name: flakeshield-control-plane
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      ANALYZER_GRPC_HOST: analyzer
      ANALYZER_GRPC_PORT: "50051"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      analyzer:
        condition: service_healthy
    volumes:
      - ./control-plane:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js Dashboard ──────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: flakeshield-dashboard
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - control-plane

volumes:
  postgres_data:
  redis_data:
